<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Multi</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<header>
<h2>🌐 P2P Chat</h2>

<button id="btnSetting">
⚙️
</button>
</header>


<div id="status">
Belum Konek
</div>



<div class="layout">

<div class="peer card">

<h3>Peer</h3>

<div id="peerList">
Belum ada koneksi
</div>

</div>


<div class="chat card">

<div id="chatBox"></div>


<div class="input">

<input id="msgInput"
placeholder="Ketik pesan...">

<button id="btnSend" disabled>
➤
</button>

</div>

</div>


</div>




<div id="connectionBox" class="card hidden">

<h3>Koneksi Baru</h3>


<textarea id="localSDP"
readonly
placeholder="Kode saya">
</textarea>


<button id="btnCopy">
📋 Copy
</button>


<textarea id="remoteSDP"
placeholder="Tempel kode teman">
</textarea>



<div class="row">

<button id="btnOffer">
🟢 Buat
</button>


<button id="btnAnswer">
🔵 Paste & Proses
</button>

</div>


</div>



<div id="toast">
Tersalin
</div>


<script src="app.js"></script>

</body>
</html>
