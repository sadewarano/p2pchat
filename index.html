<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat Multi</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🌐 P2P Chat Multi</h2>

<div class="card">
  <div id="status">Status: Belum Konek</div>
</div>

<div class="card">
  <h3>Kode Offer / Answer</h3>

  <textarea id="localSDP" readonly
    placeholder="Kode akan muncul di sini"></textarea>

  <button id="btnCopy">
    📋 Copy
  </button>

  <textarea id="remoteSDP"
    placeholder="Tempel kode teman"></textarea>

  <div class="row">
    <button id="btnOffer">
      🟢 Buat
    </button>

    <button id="btnAnswer">
      🔵 Proses
    </button>
  </div>
</div>

<div class="card">
  <h3>Koneksi</h3>
  <div id="peerList">
    Belum ada koneksi
  </div>
</div>

<div class="card">
  <h3>Chat</h3>

  <div id="chatBox"></div>

  <input
    id="msgInput"
    placeholder="Ketik pesan...">

  <button id="btnSend" disabled>
    Kirim
  </button>
</div>

<div id="toast">
  Tersalin
</div>

<script src="app.js"></script>

</body>
</html>
