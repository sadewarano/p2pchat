<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<header>

<div class="profile">

<div id="peerName">
🌐 P2P Chat
</div>

<small id="status">
Belum Konek
</small>

</div>


<button id="btnSetting">
⚙️
</button>

</header>



<div class="layout">


<div class="chat">

<div id="chatBox">
</div>


<div class="input">

<input id="msgInput"
placeholder="Ketik pesan...">


<button id="btnSend" disabled>
➤
</button>


</div>

</div>


</div>



<div id="connectionBox" class="card hidden">

<h3>Koneksi Baru</h3>


<textarea id="localSDP"
readonly
placeholder="Kode saya">
</textarea>


<button id="btnCopy">
📋 Copy
</button>


<textarea id="remoteSDP"
placeholder="Tempel kode teman">
</textarea>



<div class="row">

<button id="btnOffer">
🟢 Buat
</button>

<button id="btnAnswer">
🔵 Ambil & Proses
</button>

<button id="btnGetAnswer">
🟣 Ambil Jawaban
</button>

</div>


</div>



<div id="toast">
Tersalin
</div>


<script src="app.js"></script>

</body>
</html>
